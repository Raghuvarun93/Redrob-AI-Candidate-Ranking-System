ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) as a development assistant throughout: reading and
  summarizing the JD/spec/schema documents, profiling the candidate dataset
  to identify trap patterns (keyword-stuffed skills lists, honeypot profiles,
  hobbyist-vs-professional framing), designing the feature-extraction and
  scoring architecture, and writing/iterating on the Python implementation.
  All design decisions (scoring weights, disqualifier rules, honeypot
  detection logic) were reviewed and validated against real output by
  manually inspecting top-20/50/100 rankings before finalizing. No candidate
  data was sent to any external LLM API — the ranking pipeline itself uses
  no AI tools or external API calls at runtime, only Python stdlib.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based, explainable ranker — no embeddings model, no LLM calls, no
  network access at ranking time. Five JD-derived scoring components: (1)
  career fit — seniority band + product-company vs. consulting-only
  experience, (2) shipped-system evidence — retrieval/ranking/recommendation
  terms found in career HISTORY descriptions (not skills lists, to avoid the
  keyword-stuffing trap), plus evaluation-framework experience (NDCG/MRR/A-B
  testing), (3) technical depth — vector DB and embedding-model experience,
  (4) location/logistics fit — Pune/Noida preference, relocation, notice
  period, (5) behavioral availability — recency, recruiter response rate,
  interview completion, GitHub activity. Explicit JD disqualifiers (pure
  research-only, all-consulting career, CV/speech-primary, recent-LLM-wrapper-
  only, seniority-escalation title-chasing) are applied as multiplicative
  penalties so a single hard disqualifier can suppress an otherwise
  keyword-rich profile. Skills-list-only term matches (no corroborating
  career history) are heavily discounted relative to career-history matches,
  specifically to defeat keyword-stuffed trap profiles. Self-disclosed
  "hobbyist/side-project" framing is detected and discounted separately from
  honeypots — these are honest candidates, just not production-ready, so they
  are down-weighted rather than excluded. Honeypot detection checks
  self-consistency across fields (years-of-experience vs. career-history
  total, summary text vs. profile field, expert-proficiency-with-zero-usage
  skill claims) and excludes flagged candidates entirely from ranking, rather
  than down-weighting them. Runtime is ~60-70 seconds for the full 100K
  candidates on a 4-core CPU with no GPU and no network calls.

